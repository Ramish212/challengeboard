<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ChallengeBoard — Compete. Improve. Win.</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Syne:wght@700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { min-height: 100vh; background: #0E0E12; }
    #root { min-height: 100vh; }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #1a1a22; }
    ::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const SAMPLE_CHALLENGES = [
      { id: 1, text: "Drink 8 glasses of water", category: "health", points: 10 },
      { id: 2, text: "Read for 20 minutes", category: "learning", points: 15 },
      { id: 3, text: "No social media before noon", category: "focus", points: 20 },
      { id: 4, text: "Do 20 push-ups", category: "health", points: 10 },
      { id: 5, text: "Write in a journal", category: "mindset", points: 15 },
      { id: 6, text: "Reach out to an old friend", category: "social", points: 20 },
    ];

    const CATEGORY_COLORS = {
      health:   { bg: "#FFE8D6", text: "#C84B00" },
      learning: { bg: "#D6F0FF", text: "#005F99" },
      focus:    { bg: "#E8D6FF", text: "#6600CC" },
      mindset:  { bg: "#D6FFE8", text: "#007A3D" },
      social:   { bg: "#FFF3D6", text: "#996600" },
      custom:   { bg: "#F0F0F0", text: "#444444" },
    };

    const LEADERBOARD_DATA = [
      { name: "Alex K.", streak: 14, points: 420, avatar: "🦁" },
      { name: "Sam R.",  streak: 9,  points: 310, avatar: "🐯" },
      { name: "You",     streak: 0,  points: 0,   avatar: "⭐", isUser: true },
      { name: "Jordan M.", streak: 5, points: 200, avatar: "🐺" },
      { name: "Taylor S.", streak: 3, points: 150, avatar: "🦊" },
    ];

    const formatDate = () => new Date().toLocaleDateString("en-US", { weekday: "long", month: "long", day: "numeric" });

    function App() {
      const [challenges, setChallenges]   = useState(SAMPLE_CHALLENGES.slice(0, 4));
      const [completed, setCompleted]     = useState({});
      const [streak, setStreak]              = useState(0);
      const [totalPoints, setTotalPoints] = useState(() => parseInt(localStorage.getItem("cb_points") || "0", 10));
      const [tab, setTab]                 = useState("today");
      const [newChallenge, setNewChallenge] = useState("");
      const [newCategory, setNewCategory]   = useState("custom");
      const [celebratingId, setCelebratingId] = useState(null);
      const [allDone, setAllDone]           = useState(false);
      const [leaderboard, setLeaderboard]   = useState(LEADERBOARD_DATA);
      const [showSignup, setShowSignup]     = useState(!localStorage.getItem("cb_signed_up"));
      const [signupData, setSignupData]     = useState({ name: "", email: "", password: "" });
      const [signupStatus, setSignupStatus] = useState("idle");
      const [signupError, setSignupError]   = useState("");
      const [inviteLink]                    = useState(window.location.href);
      const [copied, setCopied]             = useState(false);
      const [inviteEmail, setInviteEmail]   = useState("");
      const [inviteSent, setInviteSent]     = useState(false);
      const [userName, setUserName]         = useState(localStorage.getItem("cb_username") || "You");

      useEffect(() => {
        const done = challenges.length > 0 && Object.keys(completed).length === challenges.length;
        setAllDone(done);
      }, [completed, challenges]);

      // Daily streak tracker — only runs if user has signed up
      useEffect(() => {
        if (!localStorage.getItem("cb_signed_up")) return;
        const today = new Date().toISOString().slice(0, 10);
        const lastLogin = localStorage.getItem("cb_last_login");
        const savedStreak = parseInt(localStorage.getItem("cb_streak") || "0", 10);

        if (!lastLogin) {
          localStorage.setItem("cb_last_login", today);
          localStorage.setItem("cb_streak", "1");
          setStreak(1);
        } else if (lastLogin === today) {
          setStreak(savedStreak);
        } else {
          const yesterday = new Date();
          yesterday.setDate(yesterday.getDate() - 1);
          const yesterdayStr = yesterday.toISOString().slice(0, 10);
          const newStreak = lastLogin === yesterdayStr ? savedStreak + 1 : 1;
          localStorage.setItem("cb_last_login", today);
          localStorage.setItem("cb_streak", String(newStreak));
          setStreak(newStreak);
        }
      }, []);

      const toggleChallenge = (id, points) => {
        if (completed[id]) {
          setCompleted(prev => { const n = {...prev}; delete n[id]; return n; });
          setTotalPoints(p => { const n = p - points; localStorage.setItem("cb_points", n); return n; });
          setLeaderboard(prev => prev.map(e => e.isUser ? {...e, points: e.points - points} : e));
        } else {
          setCompleted(prev => ({...prev, [id]: true}));
          setTotalPoints(p => { const n = p + points; localStorage.setItem("cb_points", n); return n; });
          setCelebratingId(id);
          setLeaderboard(prev => prev.map(e => e.isUser ? {...e, points: e.points + points} : e));
          setTimeout(() => setCelebratingId(null), 700);
        }
      };

      const addChallenge = () => {
        if (!newChallenge.trim()) return;
        setChallenges(prev => [...prev, { id: Date.now(), text: newChallenge.trim(), category: newCategory, points: 15 }]);
        setNewChallenge("");
      };

      const removeChallenge = (id) => {
        setChallenges(prev => prev.filter(c => c.id !== id));
        setCompleted(prev => { const n = {...prev}; delete n[id]; return n; });
      };

      const copyInviteLink = () => {
        navigator.clipboard.writeText(inviteLink).catch(() => {});
        setCopied(true);
        setTimeout(() => setCopied(false), 2000);
      };

      const sendInvite = () => {
        if (!inviteEmail.trim()) return;
        setInviteSent(true);
        setInviteEmail("");
        setTimeout(() => setInviteSent(false), 3000);
      };

      const handleSignup = async (e) => {
        e.preventDefault();
        if (!signupData.name || !signupData.email || signupData.password.length < 6) return;
        setSignupStatus("loading");
        setSignupError("");
        try {
          const formData = new FormData();
          formData.append("name", signupData.name);
          formData.append("email", signupData.email);
          formData.append("_subject", "New ChallengeBoard Sign Up");
          const res = await fetch("https://formspree.io/f/mjgenlbo", {
            method: "POST",
            headers: { "Accept": "application/json" },
            body: formData,
          });
          const data = await res.json();
          if (res.ok) {
            const firstName = signupData.name.split(" ")[0];
            // Persist signup + initialize streak
            localStorage.setItem("cb_signed_up", "1");
            localStorage.setItem("cb_username", firstName);
            localStorage.setItem("cb_last_login", new Date().toISOString().slice(0, 10));
            localStorage.setItem("cb_streak", "1");
            setUserName(firstName);
            setStreak(1);
            setLeaderboard(prev => prev.map(e => e.isUser ? {...e, name: firstName} : e));
            setSignupStatus("success");
            setTimeout(() => setShowSignup(false), 2500);
          } else {
            setSignupStatus("error");
            setSignupError(data?.errors?.[0]?.message || "Something went wrong. Please try again.");
          }
        } catch {
          setSignupStatus("error");
          setSignupError("Network error. Please check your connection and try again.");
        }
      };

      const sorted = [...leaderboard].sort((a, b) => b.points - a.points);
      const completedCount = Object.keys(completed).length;
      const progress = challenges.length ? (completedCount / challenges.length) * 100 : 0;

      return (
        <div style={{ minHeight: "100vh", background: "#0E0E12", fontFamily: "'DM Mono', 'Courier New', monospace", color: "#F0EDE6" }}>
          <style>{`
            .tab-btn { background: none; border: none; cursor: pointer; font-family: 'DM Mono', monospace; font-size: 13px; letter-spacing: 0.08em; padding: 8px 18px; border-radius: 6px; transition: all 0.2s; }
            .tab-btn.active { background: #F0EDE6; color: #0E0E12; }
            .tab-btn.inactive { color: #666; }
            .tab-btn.inactive:hover { color: #aaa; }
            .challenge-card { display: flex; align-items: center; gap: 16px; padding: 18px 20px; border-radius: 12px; background: #16161E; border: 1px solid #252530; margin-bottom: 10px; cursor: pointer; transition: all 0.2s; }
            .challenge-card:hover { border-color: #3a3a50; transform: translateX(3px); }
            .challenge-card.done { background: #12201A; border-color: #1E4030; }
            .challenge-card.celebrating { animation: pop 0.4s ease; }
            @keyframes pop { 0%{transform:scale(1) translateX(3px)} 40%{transform:scale(1.02) translateX(3px)} 100%{transform:scale(1) translateX(3px)} }
            .check-circle { width: 28px; height: 28px; border-radius: 50%; border: 2px solid #333; background: none; display: flex; align-items: center; justify-content: center; transition: all 0.25s; flex-shrink: 0; }
            .check-circle.done { background: #00C966; border-color: #00C966; }
            .add-btn { background: #F0EDE6; color: #0E0E12; border: none; padding: 10px 22px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; cursor: pointer; font-weight: 500; letter-spacing: 0.05em; transition: all 0.15s; }
            .add-btn:hover { background: #fff; transform: translateY(-1px); }
            .progress-bar { height: 4px; background: #1e1e28; border-radius: 2px; overflow: hidden; }
            .progress-fill { height: 100%; background: linear-gradient(90deg, #00C966, #0099FF); border-radius: 2px; transition: width 0.5s ease; }
            .stat-box { background: #16161E; border: 1px solid #252530; border-radius: 12px; padding: 20px; flex: 1; }
            .leaderboard-row { display: flex; align-items: center; gap: 14px; padding: 14px 16px; border-radius: 10px; margin-bottom: 8px; background: #16161E; border: 1px solid #252530; transition: border-color 0.2s; }
            .leaderboard-row.user-row { border-color: #00C966; background: #12201A; }
            .badge { display: inline-flex; align-items: center; padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 500; letter-spacing: 0.06em; }
            .all-done-banner { background: linear-gradient(135deg, #0D3825, #0A2A50); border: 1px solid #00C966; border-radius: 14px; padding: 24px; text-align: center; margin-bottom: 24px; animation: fadeInDown 0.5s ease; }
            @keyframes fadeInDown { from{opacity:0;transform:translateY(-10px)} to{opacity:1;transform:translateY(0)} }
            .remove-btn { background: none; border: none; color: #444; cursor: pointer; font-size: 16px; padding: 4px; transition: color 0.2s; margin-left: auto; flex-shrink: 0; }
            .remove-btn:hover { color: #FF5555; }
            .input-field { background: #16161E; border: 1px solid #252530; color: #F0EDE6; padding: 10px 16px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
            .input-field:focus { border-color: #555; }
            .input-field::placeholder { color: #444; }
            .select-field { background: #16161E; border: 1px solid #252530; color: #F0EDE6; padding: 10px 14px; border-radius: 8px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; cursor: pointer; }
            .fade-in { animation: fadeIn 0.4s ease forwards; opacity: 0; }
            @keyframes fadeIn { to{opacity:1} }
            .signup-overlay { position: fixed; inset: 0; z-index: 100; background: rgba(5,5,8,0.93); display: flex; align-items: center; justify-content: center; padding: 20px; backdrop-filter: blur(6px); animation: fadeIn 0.3s ease forwards; }
            .signup-card { background: #13131A; border: 1px solid #2a2a38; border-radius: 18px; padding: 36px 32px; width: 100%; max-width: 420px; animation: slideUp 0.35s cubic-bezier(0.16,1,0.3,1) forwards; }
            @keyframes slideUp { from{opacity:0;transform:translateY(24px)} to{opacity:1;transform:translateY(0)} }
            .signup-input { width: 100%; background: #0E0E12; border: 1px solid #252530; color: #F0EDE6; padding: 13px 16px; border-radius: 10px; font-family: 'DM Mono', monospace; font-size: 13px; outline: none; transition: border-color 0.2s; }
            .signup-input:focus { border-color: #00C966; }
            .signup-input::placeholder { color: #383840; }
            .signup-btn { width: 100%; background: #F0EDE6; color: #0E0E12; border: none; padding: 14px; border-radius: 10px; font-family: 'Syne', sans-serif; font-size: 15px; font-weight: 800; letter-spacing: 0.06em; cursor: pointer; transition: all 0.2s; margin-top: 4px; }
            .signup-btn:hover:not(:disabled) { background: #fff; transform: translateY(-1px); }
            .signup-btn:disabled { cursor: not-allowed; transform: none; }
            @keyframes spin { to{transform:rotate(360deg)} }
            @keyframes fillBar { from{width:0%} to{width:100%} }
          `}</style>

          {/* ── SIGNUP MODAL ── */}
          {showSignup && (
            <div className="signup-overlay">
              <div className="signup-card">
                <div style={{ textAlign: "center", marginBottom: 28 }}>
                  <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 22, fontWeight: 800, letterSpacing: "-0.02em" }}>
                    CHALLENGE<span style={{ color: "#00C966" }}>BOARD</span>
                  </div>
                  <div style={{ color: "#444", fontSize: 12, marginTop: 6, letterSpacing: "0.06em" }}>COMPETE. IMPROVE. WIN.</div>
                </div>

                {signupStatus === "success" ? (
                  <div style={{ textAlign: "center", padding: "20px 0" }}>
                    <div style={{ fontSize: 48, marginBottom: 12 }}>🎉</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 800, marginBottom: 8, color: "#00C966" }}>YOU'RE IN!</div>
                    <div style={{ color: "#666", fontSize: 13, lineHeight: 1.6 }}>
                      Welcome, {signupData.name.split(" ")[0]}!<br />Loading your challenges...
                    </div>
                    <div style={{ marginTop: 20, height: 3, background: "#1e1e28", borderRadius: 2, overflow: "hidden" }}>
                      <div style={{ height: "100%", background: "linear-gradient(90deg,#00C966,#0099FF)", borderRadius: 2, animation: "fillBar 2.5s linear forwards" }} />
                    </div>
                  </div>
                ) : (
                  <>
                    <div style={{ marginBottom: 22 }}>
                      <div style={{ fontSize: 18, fontFamily: "'Syne', sans-serif", fontWeight: 800, marginBottom: 4 }}>Create your account</div>
                      <div style={{ color: "#555", fontSize: 12 }}>Join friends and start your streak today</div>
                    </div>

                    <div style={{ marginBottom: 12 }}>
                      <label style={{ fontSize: 11, color: "#555", letterSpacing: "0.07em", display: "block", marginBottom: 6 }}>FULL NAME</label>
                      <input className="signup-input" placeholder="e.g. Alex Johnson" value={signupData.name}
                        onChange={e => { setSignupData(p => ({...p, name: e.target.value})); setSignupError(""); }} />
                    </div>

                    <div style={{ marginBottom: 12 }}>
                      <label style={{ fontSize: 11, color: "#555", letterSpacing: "0.07em", display: "block", marginBottom: 6 }}>EMAIL ADDRESS</label>
                      <input className="signup-input" type="email" placeholder="you@email.com" value={signupData.email}
                        onChange={e => { setSignupData(p => ({...p, email: e.target.value})); setSignupError(""); }} />
                    </div>

                    <div style={{ marginBottom: 18 }}>
                      <label style={{ fontSize: 11, color: "#555", letterSpacing: "0.07em", display: "block", marginBottom: 6 }}>PASSWORD</label>
                      <input className="signup-input" type="password" placeholder="Min. 6 characters" value={signupData.password}
                        onChange={e => { setSignupData(p => ({...p, password: e.target.value})); setSignupError(""); }}
                        onKeyDown={e => e.key === "Enter" && handleSignup(e)} />
                      {signupData.password.length > 0 && (
                        <div style={{ marginTop: 6, display: "flex", gap: 4, alignItems: "center" }}>
                          {[1,2,3,4].map(i => (
                            <div key={i} style={{ flex: 1, height: 3, borderRadius: 2, transition: "background 0.3s",
                              background: signupData.password.length >= i * 2
                                ? (signupData.password.length >= 8 ? "#00C966" : signupData.password.length >= 4 ? "#FFAA00" : "#FF5555")
                                : "#1e1e28" }} />
                          ))}
                          <span style={{ fontSize: 10, color: "#555", marginLeft: 4 }}>
                            {signupData.password.length < 4 ? "Weak" : signupData.password.length < 8 ? "Fair" : "Strong"}
                          </span>
                        </div>
                      )}
                    </div>

                    {signupError && (
                      <div style={{ color: "#FF5555", fontSize: 12, marginBottom: 14, padding: "10px 14px", background: "#FF555511", borderRadius: 8, border: "1px solid #FF555533", display: "flex", gap: 8, alignItems: "center" }}>
                        <span>⚠</span><span>{signupError}</span>
                      </div>
                    )}

                    <button className="signup-btn"
                      disabled={signupStatus === "loading" || !signupData.name || !signupData.email || signupData.password.length < 6}
                      style={{ opacity: (!signupData.name || !signupData.email || signupData.password.length < 6) ? 0.4 : 1,
                               background: signupStatus === "loading" ? "#333" : "#F0EDE6",
                               color: signupStatus === "loading" ? "#888" : "#0E0E12" }}
                      onClick={handleSignup}>
                      {signupStatus === "loading"
                        ? <span style={{ display: "flex", alignItems: "center", justifyContent: "center", gap: 8 }}>
                            <span style={{ display: "inline-block", width: 14, height: 14, border: "2px solid #555", borderTopColor: "#aaa", borderRadius: "50%", animation: "spin 0.7s linear infinite" }} />
                            CREATING ACCOUNT...
                          </span>
                        : "GET STARTED →"}
                    </button>

                    <div style={{ marginTop: 16, padding: "12px 14px", background: "#0E0E12", borderRadius: 8, border: "1px solid #1e1e28", textAlign: "center" }}>
                      <div style={{ fontSize: 11, color: "#444", lineHeight: 1.6 }}>
                        By signing up you agree to our Terms &amp; Privacy Policy.<br />No spam, ever.
                      </div>
                    </div>
                  </>
                )}
              </div>
            </div>
          )}

          {/* ── MAIN APP ── */}
          <div style={{ maxWidth: 640, margin: "0 auto", padding: "32px 20px 0" }}>
            {/* Header */}
            <div style={{ display: "flex", justifyContent: "space-between", alignItems: "flex-start", marginBottom: 28 }}>
              <div>
                <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 26, fontWeight: 800, letterSpacing: "-0.02em", lineHeight: 1 }}>
                  CHALLENGE<br /><span style={{ color: "#00C966" }}>BOARD</span>
                </div>
                <div style={{ color: "#555", fontSize: 12, marginTop: 8, letterSpacing: "0.08em" }}>{formatDate().toUpperCase()}</div>
              </div>
              <div style={{ textAlign: "right" }}>
                <div style={{ display: "flex", alignItems: "center", gap: 8, justifyContent: "flex-end", marginBottom: 6 }}>
                  <span style={{ fontSize: 18 }}>🔥</span>
                  <span style={{ fontFamily: "'Syne', sans-serif", fontSize: 24, fontWeight: 800 }}>{streak}</span>
                  <span style={{ color: "#555", fontSize: 12, letterSpacing: "0.06em" }}>DAY STREAK</span>
                </div>
                <div style={{ display: "flex", alignItems: "center", gap: 6, justifyContent: "flex-end" }}>
                  <span style={{ color: "#FFAA00", fontSize: 14 }}>⚡</span>
                  <span style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 700 }}>{totalPoints}</span>
                  <span style={{ color: "#555", fontSize: 12 }}>PTS</span>
                </div>
              </div>
            </div>

            {/* Progress */}
            <div style={{ marginBottom: 28 }}>
              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 8 }}>
                <span style={{ fontSize: 12, color: "#666", letterSpacing: "0.06em" }}>TODAY'S PROGRESS</span>
                <span style={{ fontSize: 12 }}>{completedCount}/{challenges.length}</span>
              </div>
              <div className="progress-bar">
                <div className="progress-fill" style={{ width: `${progress}%` }} />
              </div>
            </div>

            {/* Tabs */}
            <div style={{ display: "flex", gap: 4, background: "#16161E", padding: 4, borderRadius: 10, marginBottom: 28, border: "1px solid #252530" }}>
              {["today", "board", "friends"].map(t => (
                <button key={t} className={`tab-btn ${tab === t ? "active" : "inactive"}`} style={{ flex: 1, textTransform: "uppercase" }} onClick={() => setTab(t)}>
                  {t === "today" ? "Challenges" : t === "board" ? "Leaderboard" : "Friends"}
                </button>
              ))}
            </div>

            {/* ── TODAY TAB ── */}
            {tab === "today" && (
              <div className="fade-in">
                {allDone && (
                  <div className="all-done-banner">
                    <div style={{ fontSize: 32, marginBottom: 8 }}>🏆</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 800, marginBottom: 4 }}>ALL DONE!</div>
                    <div style={{ color: "#aaa", fontSize: 13 }}>You crushed today's challenges. Keep the streak alive!</div>
                  </div>
                )}
                {challenges.map((c) => {
                  const cat = CATEGORY_COLORS[c.category] || CATEGORY_COLORS.custom;
                  const isDone = !!completed[c.id];
                  return (
                    <div key={c.id} className={`challenge-card ${isDone ? "done" : ""} ${celebratingId === c.id ? "celebrating" : ""}`}
                      onClick={() => toggleChallenge(c.id, c.points)}>
                      <div className={`check-circle ${isDone ? "done" : ""}`}>
                        {isDone && <span style={{ color: "#fff", fontSize: 14, fontWeight: 700 }}>✓</span>}
                      </div>
                      <div style={{ flex: 1 }}>
                        <div style={{ fontSize: 14, color: isDone ? "#666" : "#F0EDE6", textDecoration: isDone ? "line-through" : "none", marginBottom: 6 }}>{c.text}</div>
                        <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                          <span className="badge" style={{ background: cat.bg, color: cat.text }}>{c.category}</span>
                          <span style={{ color: "#FFAA00", fontSize: 11 }}>+{c.points} pts</span>
                        </div>
                      </div>
                      <button className="remove-btn" onClick={e => { e.stopPropagation(); removeChallenge(c.id); }}>×</button>
                    </div>
                  );
                })}
                <div style={{ marginTop: 24, padding: "20px", background: "#16161E", border: "1px solid #252530", borderRadius: 12 }}>
                  <div style={{ fontSize: 12, color: "#666", letterSpacing: "0.08em", marginBottom: 14 }}>ADD CHALLENGE</div>
                  <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
                    <input className="input-field" style={{ flex: "1 1 200px" }} placeholder="New challenge..."
                      value={newChallenge} onChange={e => setNewChallenge(e.target.value)} onKeyDown={e => e.key === "Enter" && addChallenge()} />
                    <select className="select-field" value={newCategory} onChange={e => setNewCategory(e.target.value)}>
                      {Object.keys(CATEGORY_COLORS).map(k => <option key={k} value={k}>{k}</option>)}
                    </select>
                    <button className="add-btn" onClick={addChallenge}>+ ADD</button>
                  </div>
                </div>
              </div>
            )}

            {/* ── LEADERBOARD TAB ── */}
            {tab === "board" && (
              <div className="fade-in">
                {sorted.map((entry, i) => (
                  <div key={entry.name} className={`leaderboard-row ${entry.isUser ? "user-row" : ""}`}>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 14, fontWeight: 800, width: 20, textAlign: "center",
                      color: i === 0 ? "#FFAA00" : i === 1 ? "#aaa" : i === 2 ? "#cc7744" : "#444" }}>{i + 1}</div>
                    <div style={{ fontSize: 22 }}>{entry.avatar}</div>
                    <div style={{ flex: 1 }}>
                      <div style={{ fontSize: 14 }}>{entry.isUser ? userName : entry.name} {entry.isUser && <span style={{ color: "#00C966", fontSize: 11 }}>(you)</span>}</div>
                      <div style={{ color: "#666", fontSize: 11, marginTop: 2 }}>🔥 {entry.streak}d streak</div>
                    </div>
                    <div style={{ textAlign: "right" }}>
                      <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 18, fontWeight: 800, color: entry.isUser ? "#00C966" : "#F0EDE6" }}>
                        {entry.isUser ? totalPoints : entry.points}
                      </div>
                      <div style={{ color: "#555", fontSize: 11 }}>pts</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* ── FRIENDS TAB ── */}
            {tab === "friends" && (
              <div className="fade-in">
                {/* Stats */}
                <div style={{ display: "flex", gap: 14, marginBottom: 20 }}>
                  <div className="stat-box">
                    <div style={{ color: "#555", fontSize: 11, letterSpacing: "0.08em", marginBottom: 8 }}>YOUR STREAK</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 36, fontWeight: 800, color: "#FF6B35" }}>🔥 {streak}</div>
                    <div style={{ color: "#555", fontSize: 12, marginTop: 4 }}>days in a row</div>
                  </div>
                  <div className="stat-box">
                    <div style={{ color: "#555", fontSize: 11, letterSpacing: "0.08em", marginBottom: 8 }}>TOTAL POINTS</div>
                    <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 36, fontWeight: 800, color: "#FFAA00" }}>⚡ {totalPoints}</div>
                    <div style={{ color: "#555", fontSize: 12, marginTop: 4 }}>all time</div>
                  </div>
                </div>

                {/* Invite */}
                <div style={{ padding: "20px", background: "#16161E", border: "1px solid #252530", borderRadius: 12, marginBottom: 16 }}>
                  <div style={{ fontSize: 12, color: "#666", letterSpacing: "0.08em", marginBottom: 14 }}>INVITE FRIENDS</div>
                  <div style={{ marginBottom: 14 }}>
                    <div style={{ fontSize: 12, color: "#555", marginBottom: 8 }}>Share your invite link</div>
                    <div style={{ display: "flex", gap: 8 }}>
                      <div style={{ flex: 1, background: "#0E0E12", border: "1px solid #252530", borderRadius: 8, padding: "10px 14px", fontSize: 12, color: "#555", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>{inviteLink}</div>
                      <button className="add-btn" onClick={copyInviteLink}
                        style={{ background: copied ? "#00C966" : "#F0EDE6", color: "#0E0E12", minWidth: 80 }}>
                        {copied ? "✓ COPIED" : "COPY"}
                      </button>
                    </div>
                  </div>
                  <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 14 }}>
                    <div style={{ flex: 1, height: 1, background: "#1e1e28" }} />
                    <span style={{ color: "#444", fontSize: 11, letterSpacing: "0.08em" }}>OR SEND VIA EMAIL</span>
                    <div style={{ flex: 1, height: 1, background: "#1e1e28" }} />
                  </div>
                  <div style={{ display: "flex", gap: 8 }}>
                    <input className="input-field" style={{ flex: 1 }} placeholder="friend@email.com" type="email"
                      value={inviteEmail} onChange={e => setInviteEmail(e.target.value)} onKeyDown={e => e.key === "Enter" && sendInvite()} />
                    <button className="add-btn" onClick={sendInvite}
                      style={{ background: inviteSent ? "#00C966" : "#F0EDE6", color: "#0E0E12", minWidth: 80 }}>
                      {inviteSent ? "✓ SENT!" : "INVITE"}
                    </button>
                  </div>
                  {inviteSent && <div style={{ marginTop: 10, color: "#00C966", fontSize: 12 }}>🎉 Invite sent! They'll get a link to join your board.</div>}
                  <div style={{ display: "flex", gap: 8, marginTop: 14 }}>
                    {[{ label: "𝕏 Twitter", color: "#1DA1F2" }, { label: "WhatsApp", color: "#25D366" }, { label: "Telegram", color: "#0088CC" }].map(({ label, color }) => (
                      <button key={label} style={{ flex: 1, background: "#0E0E12", border: `1px solid ${color}33`, color, borderRadius: 8, padding: "8px 4px", fontSize: 11, fontFamily: "'DM Mono', monospace", cursor: "pointer", letterSpacing: "0.04em", transition: "all 0.2s" }}
                        onMouseEnter={e => e.currentTarget.style.background = `${color}18`}
                        onMouseLeave={e => e.currentTarget.style.background = "#0E0E12"}>
                        {label}
                      </button>
                    ))}
                  </div>
                </div>

                {/* Friends Dashboard */}
                <div style={{ padding: "20px", background: "#16161E", border: "1px solid #252530", borderRadius: 12, marginBottom: 16 }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", marginBottom: 16 }}>
                    <div style={{ fontSize: 12, color: "#666", letterSpacing: "0.08em" }}>FRIENDS DASHBOARD</div>
                    <span style={{ fontSize: 11, color: "#444" }}>{leaderboard.filter(e => !e.isUser).length} friends</span>
                  </div>
                  {(() => {
                    const top = [...leaderboard].filter(e => !e.isUser).sort((a, b) => b.points - a.points)[0];
                    const diff = top.points - totalPoints;
                    return (
                      <div style={{ background: "linear-gradient(135deg,#1A1A2E,#16213E)", border: "1px solid #2a2a45", borderRadius: 10, padding: "14px 16px", marginBottom: 14, display: "flex", alignItems: "center", gap: 12 }}>
                        <div style={{ fontSize: 28 }}>{top.avatar}</div>
                        <div style={{ flex: 1 }}>
                          <div style={{ fontSize: 13, marginBottom: 3 }}><span style={{ color: "#FFAA00" }}>👑 </span>{top.name} is leading</div>
                          <div style={{ fontSize: 11, color: "#555" }}>{diff > 0 ? `You're ${diff} pts behind — catch up!` : `You're ahead by ${Math.abs(diff)} pts — keep going!`}</div>
                        </div>
                        <div style={{ textAlign: "right" }}>
                          <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 20, fontWeight: 800, color: "#FFAA00" }}>{top.points}</div>
                          <div style={{ color: "#555", fontSize: 11 }}>pts</div>
                        </div>
                      </div>
                    );
                  })()}
                  {[...leaderboard].sort((a, b) => {
                    const ap = a.isUser ? totalPoints : a.points;
                    const bp = b.isUser ? totalPoints : b.points;
                    return bp - ap;
                  }).map((entry, i) => {
                    const pts = entry.isUser ? totalPoints : entry.points;
                    const maxPts = Math.max(...leaderboard.map(e => e.isUser ? totalPoints : e.points));
                    const barWidth = maxPts > 0 ? (pts / maxPts) * 100 : 0;
                    const medal = i === 0 ? "🥇" : i === 1 ? "🥈" : i === 2 ? "🥉" : null;
                    return (
                      <div key={entry.name} style={{ padding: "12px 0", borderBottom: "1px solid #1a1a22" }}>
                        <div style={{ display: "flex", alignItems: "center", gap: 10, marginBottom: 7 }}>
                          <span style={{ fontSize: 18 }}>{entry.avatar}</span>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 6 }}>
                              <span style={{ fontSize: 13, color: entry.isUser ? "#00C966" : "#F0EDE6" }}>{entry.isUser ? userName : entry.name}</span>
                              {entry.isUser && <span style={{ fontSize: 10, color: "#00C966", border: "1px solid #00C96633", borderRadius: 4, padding: "1px 6px" }}>YOU</span>}
                              {medal && <span style={{ fontSize: 12 }}>{medal}</span>}
                            </div>
                            <div style={{ fontSize: 11, color: "#555", marginTop: 1 }}>🔥 {entry.streak}d streak</div>
                          </div>
                          <div style={{ textAlign: "right" }}>
                            <div style={{ fontFamily: "'Syne', sans-serif", fontSize: 16, fontWeight: 800, color: entry.isUser ? "#00C966" : "#F0EDE6" }}>{pts}</div>
                            <div style={{ color: "#444", fontSize: 10 }}>pts</div>
                          </div>
                        </div>
                        <div style={{ height: 3, background: "#0E0E12", borderRadius: 2, overflow: "hidden" }}>
                          <div style={{ height: "100%", borderRadius: 2, width: `${barWidth}%`, background: entry.isUser ? "linear-gradient(90deg,#00C966,#0099FF)" : "linear-gradient(90deg,#333,#555)", transition: "width 0.6s ease" }} />
                        </div>
                      </div>
                    );
                  })}
                </div>

                {/* Suggested Challenges */}
                <div style={{ padding: "20px", background: "#16161E", border: "1px solid #252530", borderRadius: 12, marginBottom: 12 }}>
                  <div style={{ fontSize: 12, color: "#666", letterSpacing: "0.08em", marginBottom: 10 }}>SUGGESTED CHALLENGES</div>
                  {SAMPLE_CHALLENGES.filter(s => !challenges.find(c => c.id === s.id)).slice(0, 3).map(c => {
                    const cat = CATEGORY_COLORS[c.category];
                    return (
                      <div key={c.id} style={{ display: "flex", alignItems: "center", gap: 12, padding: "10px 0", borderBottom: "1px solid #1a1a22" }}>
                        <div style={{ flex: 1, fontSize: 13 }}>{c.text}</div>
                        <span className="badge" style={{ background: cat.bg, color: cat.text }}>{c.category}</span>
                        <button className="add-btn" style={{ padding: "6px 14px", fontSize: 12 }}
                          onClick={() => { setChallenges(p => [...p, c]); setTab("today"); }}>+ ADD</button>
                      </div>
                    );
                  })}
                  {SAMPLE_CHALLENGES.filter(s => !challenges.find(c => c.id === s.id)).length === 0 && (
                    <div style={{ color: "#444", fontSize: 13, textAlign: "center", padding: "10px 0" }}>All suggestions added!</div>
                  )}
                </div>
              </div>
            )}

            <div style={{ height: 40 }} />
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<App />);
  </script>
</body>
</html>
